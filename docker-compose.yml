services:
  postgres:
    image: postgres:17-alpine
    container_name: justsow-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-justsow_dev}
      POSTGRES_USER: ${POSTGRES_USER:-justsow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-justsow}
    volumes:
      - justsow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-justsow} -d ${POSTGRES_DB:-justsow_dev}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  justsow_postgres_data:
